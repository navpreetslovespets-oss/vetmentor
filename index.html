const store = {
  get: (k) => { try { const v = localStorage.getItem("vm_"+k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem("vm_"+k, JSON.stringify(v)); } catch {} },
};

// ─── GEMINI API + RATE LIMITING ──────────────────────────────────────────────
const GEMINI_MODEL = "gemini-2.0-flash";
const DAILY_LIMIT = 30;        // max API calls per user per day
const PER_CALL_MAX_TOKENS = 1024;

function getUsageKey(userId) { return "usage_"+userId+"_"+new Date().toISOString().slice(0,10); }
function getUserUsage(userId) { const d = store.get(getUsageKey(userId)); return d || { count:0, tokens:0 }; }
function incrementUsage(userId, tok) { const k=getUsageKey(userId), c=getUserUsage(userId); store.set(k, {count:c.count+1, tokens:c.tokens+(tok||0)}); }
function canUseAPI(userId) { return getUserUsage(userId).count < DAILY_LIMIT; }
function getRemainingCalls(userId) { return Math.max(0, DAILY_LIMIT - getUserUsage(userId).count); }
function getGeminiKey() { return localStorage.getItem("vm_gemini_key") || ""; }
function setGeminiKey(k) { localStorage.setItem("vm_gemini_key", k); }

async function callGemini(systemPrompt, userMessage, userId) {
  const key = getGeminiKey();
  if (!key) throw new Error("NO_KEY");
  if (!canUseAPI(userId)) throw new Error("RATE_LIMITED");
  const url = "https://generativelanguage.googleapis.com/v1beta/models/"+GEMINI_MODEL+":generateContent?key="+key;
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: Array.isArray(userMessage)
      ? userMessage.map(m => ({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] }))
      : [{ role: "user", parts: [{ text: userMessage }] }],
    generationConfig: { maxOutputTokens: PER_CALL_MAX_TOKENS, temperature: 0.7 }
  };
  const res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || "API error "+res.status); }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  incrementUsage(userId, data?.usageMetadata?.totalTokenCount || 0);
  return text;
}

        <input value={localComment} onChange={e=>setLocalComment(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&localComment.trim()){ addComment(post.id,localComment); setLocalComment(""); }}}
          placeholder="Add a comment..."
          style={{ flex:1,background:T.surface2,border:"1px solid "+T.border,borderRadius:20,padding:"6px 14px",fontSize:13,color:T.text,fontFamily:fontSans }}/>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function VetMentor() {
  const [screen, setScreen] = useState("login");
  const [user, setUser] = useState(null);
  const [loginForm, setLoginForm] = useState({ email:"", password:"", error:"" });
  const [selectedTopics, setSelectedTopics] = useState([]);
  const [cases, setCases] = useState(SEED_CASES);
  const [questions, setQuestions] = useState(SEED_QUESTIONS);
  const [feedPosts, setFeedPosts] = useState(SEED_FEED_POSTS);
  const [activeCaseId, setActiveCaseId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [quizTopics, setQuizTopics] = useState([]);
  const [quizQs, setQuizQs] = useState([]);
  const [quizIdx, setQuizIdx] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [quizShowExp, setQuizShowExp] = useState(false);
  const [quizDone, setQuizDone] = useState(false);
  const [userData, setUserData] = useState({});
  const [adminData, setAdminData] = useState({});
  const [caseFilter, setCaseFilter] = useState({ topic:"All", diff:"All", sp:"All" });
  const [caseView, setCaseView] = useState("cases");
  const [adminTab, setAdminTab] = useState("overview");
  const [genTopic, setGenTopic] = useState("");
  const [genSpecies, setGenSpecies] = useState("Dog");
  const [genDiff, setGenDiff] = useState("Intermediate");
  const [genType, setGenType] = useState("case");
  const [genLoading, setGenLoading] = useState(false);
  const [genPreview, setGenPreview] = useState(null);
  const [genError, setGenError] = useState("");
  const [newPostForm, setNewPostForm] = useState({ title:"", species:"", breed:"", chiefComplaint:"", clinicalFindings:"", diagnosticsSummary:"", management:"", outcome:"", learningPoint:"", tags:"" });
  const [postingCase, setPostingCase] = useState(false);
  const [toast, setToast] = useState(null);
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [, forceUpdate] = useState(0);
  const msgEnd = useRef(null);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  useEffect(()=>{ msgEnd.current?.scrollIntoView({ behavior:"smooth" }); },[messages]);

  useEffect(()=>{
    (async()=>{
      const savedCases = store.get("library_cases");
      const savedQs = store.get("library_questions");
      const savedFeed = store.get("feed_posts");
      if(savedCases) setCases(savedCases);
      if(savedQs) setQuestions(savedQs);
      if(savedFeed) setFeedPosts(savedFeed);
    })();
  },[]);

  useEffect(()=>{
    if(screen==="admin") {
      const all={};
      for(const u of USERS_DB.filter(x=>x.role==="vet")){
        const d=store.get("progress_"+u.id);
        all[u.id]={ user:u, progress:d||{ casesCompleted:[], quizzesDone:[], topicScores:{}, sessions:[], topics:[] } };
      }
      setAdminData(all);
    }
  },[screen]);

  const saveProgress = (update) => {
    const key=`progress_${user.id}`;
    const cur=store.get(key)||{ casesCompleted:[], quizzesDone:[], topicScores:{}, sessions:[], topics:selectedTopics };
    const merged={...cur,...update};
    store.set(key,merged);
    setUserData(merged);
    return merged;
  };

  const loadUserData = (uid) => {
    const d=store.get(`progress_${uid}`)||{ casesCompleted:[], quizzesDone:[], topicScores:{}, sessions:[], topics:[] };
    setUserData(d);
    return d;
  };

  const handleLogin = () => {
    const u=USERS_DB.find(x=>x.email===loginForm.email&&x.password===loginForm.password);
    if(!u){ setLoginForm(p=>({...p,error:"Invalid email or password"})); return; }
    setUser(u);
    const d=await loadUserData(u.id);
    if(!getGeminiKey()) setShowApiKeyModal(true);
    if(u.role==="admin") setScreen("admin");
    else if(d.topics?.length>0){ setSelectedTopics(d.topics); setScreen("dashboard"); }
    else setScreen("onboarding");
  };

  const handleOnboardingDone = () => {
    if(!selectedTopics.length) return;
    await saveProgress({ topics:selectedTopics });
    setScreen("dashboard");
  };

  // CASE CHAT
  const startCase = async(c) => {
    setActiveCaseId(c.id); setMessages([]); setScreen("case-chat"); setChatLoading(true);
    const sys=`You are a senior veterinary clinician teaching via Socratic method, grounded in Ettinger's Textbook of Veterinary Internal Medicine (9th Ed).
CASE: Signalment: ${c.signalment} | Complaint: ${c.presenting_complaint} | History: ${c.history} | Exam: ${c.physical_exam} | Diagnostics: ${JSON.stringify(c.diagnostics)} | Reference: ${c.reference} | Diagnosis: ${c.diagnosis} (DO NOT REVEAL until learner earns it)
RULES: Ask questions, probe reasoning, guide via case findings. Reference Ettinger when teaching. 3-5 sentences max + end with probing question. Warm but rigorous tone.`;
    try {
      const text = await callGemini(sys, "New learner. Welcome briefly, present signalment + chief complaint only, ask initial thoughts and what history questions they'd want.", user.id);
      setMessages([{role:"assistant",content:text||"Let's begin."}]);
    } catch(e) {
      if(e.message==="NO_KEY"){setShowApiKeyModal(true);setMessages([{role:"assistant",content:"Please set your Gemini API key first (click the 🔑 icon in the top bar)."}]);}
      else if(e.message==="RATE_LIMITED") setMessages([{role:"assistant",content:"You've reached your daily limit of "+DAILY_LIMIT+" AI calls. Resets tomorrow. You can still browse cases and take quizzes!"}]);
      else setMessages([{role:"assistant",content:"Welcome — let's work through this case together. What are your initial thoughts?"}]);
    }
    forceUpdate(n=>n+1);
    setChatLoading(false);
  };

  const sendChat = async() => {
    if(!chatInput.trim()||chatLoading) return;
    const c=cases.find(x=>x.id===activeCaseId);
    const sys=`You are a senior veterinary clinician teaching via Socratic method, grounded in Ettinger's Textbook of Veterinary Internal Medicine (9th Ed). CASE: ${c.signalment} | ${c.presenting_complaint} | ${c.physical_exam} | Diagnostics: ${JSON.stringify(c.diagnostics)} | Reference: ${c.reference} | Diagnosis: ${c.diagnosis} (reveal only after learner demonstrates sound reasoning). Keep responses 3-5 sentences + probing question.`;
    const newMsgs=[...messages,{role:"user",content:chatInput}];
    setMessages(newMsgs); setChatInput(""); setChatLoading(true);
    try {
      const text = await callGemini(sys, newMsgs.map(m=>({role:m.role,content:m.content})), user.id);
      setMessages([...newMsgs,{role:"assistant",content:text||"Continue."}]);
    } catch(e) {
      if(e.message==="RATE_LIMITED") setMessages([...newMsgs,{role:"assistant",content:"Daily AI limit reached ("+DAILY_LIMIT+" calls). Resets tomorrow. Great work so far!"}]);
      else if(e.message==="NO_KEY") setMessages([...newMsgs,{role:"assistant",content:"Please set your Gemini API key first."}]);
      else setMessages([...newMsgs,{role:"assistant",content:"Please continue — what is your reasoning?"}]);
    }
    forceUpdate(n=>n+1);
    setChatLoading(false);
  };

  const completeCase = () => {
    const cur=userData.casesCompleted||[];
    if(!cur.includes(activeCaseId)){
      await saveProgress({ casesCompleted:[...cur,activeCaseId], sessions:[...(userData.sessions||[]),{ type:"case",id:activeCaseId,date:new Date().toISOString(),topic:cases.find(x=>x.id===activeCaseId)?.topic }] });
    }
    showToast("Case marked complete! 🎉");
    setScreen("cases"); setActiveCaseId(null); setMessages([]);
  };

  // QUIZ
  const startQuiz = () => {
    const pool=questions.filter(q=>quizTopics.length===0||quizTopics.includes(q.topic));
    const shuffled=[...pool].sort(()=>Math.random()-0.5).slice(0,Math.min(10,pool.length));
    setQuizQs(shuffled); setQuizIdx(0); setQuizAnswers({}); setQuizDone(false); setQuizShowExp(false);
    setScreen("quiz-session");
  };

  const handleQuizAnswer=(idx)=>{ setQuizAnswers(p=>({...p,[quizQs[quizIdx].id]:idx})); setQuizShowExp(true); };

  const nextQ=async()=>{
    if(quizIdx+1>=quizQs.length){
      const score=quizQs.filter(q=>quizAnswers[q.id]===q.correct).length;
      const topicScores={...(userData.topicScores||{})};
      quizQs.forEach(q=>{ if(!topicScores[q.topic])topicScores[q.topic]={correct:0,total:0}; topicScores[q.topic].total++; if(quizAnswers[q.id]===q.correct)topicScores[q.topic].correct++; });
      await saveProgress({ topicScores, quizzesDone:[...(userData.quizzesDone||[]),{date:new Date().toISOString(),score,total:quizQs.length}], sessions:[...(userData.sessions||[]),{type:"quiz",date:new Date().toISOString(),score,total:quizQs.length}] });
      setQuizDone(true);
    } else { setQuizIdx(i=>i+1); setQuizShowExp(false); }
  };

  // AI CONTENT GENERATOR
  const generateContent = async() => {
    if(!genTopic.trim()){ setGenError("Please enter a topic"); return; }
    setGenLoading(true); setGenPreview(null); setGenError("");
    const prompt = genType==="case"
      ? `Generate a veterinary clinical case for training purposes. Topic: "${genTopic}", Species: ${genSpecies}, Difficulty: ${genDiff}.
Return ONLY this JSON (no extra text):
{
  "id": "gen_${Date.now()}",
  "topic": "${genTopic}",
  "species": "${genSpecies}",
  "breed": "specific breed",
  "difficulty": "${genDiff}",
  "title": "descriptive clinical title",
  "signalment": "age sex breed weight",
  "presenting_complaint": "chief complaint",
  "history": "relevant history",
  "physical_exam": "key findings with vitals",
  "diagnostics": {"CBC": "...", "Chemistry": "...", "Urinalysis": "...", "Imaging": "..."},
  "reference": "Ettinger 9th Ed, Ch. X — Topic Name",
  "diagnosis": "final diagnosis"
}`
      : `Generate 3 multiple-choice clinical assessment questions for veterinary training. Topic: "${genTopic}", Species: ${genSpecies}, Difficulty: ${genDiff}.
Return ONLY this JSON array (no extra text):
[
  {
    "id": "gen_${Date.now()}_1",
    "topic": "${genTopic}",
    "difficulty": "${genDiff}",
    "species": "${genSpecies}",
    "question": "clinical question",
    "options": ["A", "B", "C", "D"],
    "correct": 0,
    "reference": "Ettinger 9th Ed, Ch. X",
    "explanation": "detailed explanation of correct answer",
    "wrong": {"0": "why wrong", "1": "why wrong", "2": "why wrong"}
  }
]`;
    try {
      const text = await callGemini(GEN_SYSTEM, prompt, user.id);
      const clean=text.replace(/\`\`\`json|\`\`\`/g,"").trim();
      const parsed=JSON.parse(clean);
      setGenPreview(parsed);
    } catch(e) {
      if(e.message==="NO_KEY"){setShowApiKeyModal(true);setGenError("Please set your Gemini API key first.");}
      else if(e.message==="RATE_LIMITED") setGenError("Daily AI limit reached ("+DAILY_LIMIT+" calls). Resets tomorrow.");
      else setGenError("Generation failed — please try again with a more specific topic.");
    }
    forceUpdate(n=>n+1);
    setGenLoading(false);
  };

  const publishGenerated = () => {
    if(!genPreview) return;
    if(genType==="case"){
      const newCases=[...cases, genPreview];
      setCases(newCases);
      store.set("library_cases", newCases);
      showToast("Case published to library! 🎉");
    } else {
      const arr=Array.isArray(genPreview)?genPreview:[genPreview];
      const newQs=[...questions,...arr];
      setQuestions(newQs);
      store.set("library_questions", newQs);
      showToast(`${arr.length} questions published! 🎉`);
    }
    setGenPreview(null); setGenTopic("");
  };

  // DELETE CONTENT
  const deleteCase = (id) => {
    const updated=cases.filter(c=>c.id!==id);
    setCases(updated);
    store.set("library_cases", updated);
    showToast("Case deleted");
  };
  const deleteQuestion = (id) => {
    const updated=questions.filter(q=>q.id!==id);
    setQuestions(updated);
    store.set("library_questions", updated);
    showToast("Question deleted");
  };

  // FEED
  const submitPost = () => {
    if(!newPostForm.title||!newPostForm.chiefComplaint) return;
    const post = {
      id: `fp_${Date.now()}`,
      authorId: user.id, authorName: user.name, authorClinic: user.clinic,
      authorColor: user.color, authorAvatar: user.avatar,
      date: new Date().toISOString(),
      title: newPostForm.title, species: newPostForm.species, breed: newPostForm.breed,
      chiefComplaint: newPostForm.chiefComplaint, clinicalFindings: newPostForm.clinicalFindings,
      diagnosticsSummary: newPostForm.diagnosticsSummary, management: newPostForm.management,
      outcome: newPostForm.outcome, learningPoint: newPostForm.learningPoint,
      tags: newPostForm.tags.split(",").map(t=>t.trim()).filter(Boolean),
      reactions:{"❤️":0,"🧠":0,"👏":0}, comments:[]
    };
    const updated=[post,...feedPosts];
    setFeedPosts(updated);
    store.set("feed_posts",updated);
    setNewPostForm({ title:"",species:"",breed:"",chiefComplaint:"",clinicalFindings:"",diagnosticsSummary:"",management:"",outcome:"",learningPoint:"",tags:"" });
    setPostingCase(false);
    showToast("Case published to the feed! 🎉");
  };

  const addReaction = (postId, emoji) => {
    const updated=feedPosts.map(p=>p.id===postId?{...p,reactions:{...p.reactions,[emoji]:(p.reactions[emoji]||0)+1}}:p);
    setFeedPosts(updated);
    store.set("feed_posts",updated);
  };

  const addComment = (postId, text) => {
    if(!text.trim()) return;
    const newComment={ id:`c_${Date.now()}`, authorId:user.id, authorName:user.name, avatar:user.avatar, color:user.color, text, date:new Date().toISOString() };
    const updated=feedPosts.map(p=>p.id===postId?{...p,comments:[...p.comments,newComment]}:p);
    setFeedPosts(updated);
    store.set("feed_posts",updated);
  };

  // ─── STYLES ─────────────────────────────────────────────────────────────────
  const T = {
    bg:"#f7f6f3",        // warm off-white (Notion-like)
    surface:"#ffffff",   // card white
    surface2:"#f1efe9",  // subtle warm tint
    border:"#e5e2da",    // warm border
    border2:"#d1cec5",   // slightly darker border
    text:"#1a1916",      // rich near-black
    text2:"#4a4742",     // body text
    muted:"#9b9690",     // muted text
    accent:"#6366f1",    // indigo accent
    accentLight:"#eef2ff",
    success:"#16a34a", successLight:"#f0fdf4",
    warn:"#d97706", warnLight:"#fffbeb",
    danger:"#dc2626", dangerLight:"#fef2f2",
  };

  const font = `'Lora', 'Georgia', serif`;
  const fontSans = `'DM Sans', system-ui, sans-serif`;

  const GLOBAL_CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: ${T.bg}; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: ${T.bg}; }
    ::-webkit-scrollbar-thumb { background: ${T.border2}; border-radius: 10px; }
    input, button, textarea, select { font-family: ${fontSans}; }
    input:focus, textarea:focus { outline: none !important; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse3 { 0%,80%,100%{opacity:.25;transform:scale(.7)}40%{opacity:1;transform:scale(1)} }
    @keyframes toastIn { from{transform:translateX(120%)} to{transform:translateX(0)} }
  `;

  const Card = ({children, style={}, onClick}) => (
    <div onClick={onClick} style={{ background:T.surface, border:`1px solid ${T.border}`, borderRadius:12, ...style, cursor:onClick?"pointer":"default", transition:"box-shadow 0.2s, border-color 0.2s", ...(onClick?{ ":hover":{ boxShadow:"0 4px 20px rgba(0,0,0,0.07)" } }:{}) }}
      onMouseEnter={onClick?e=>{e.currentTarget.style.boxShadow="0 4px 20px rgba(0,0,0,0.08)";e.currentTarget.style.borderColor=T.border2}:undefined}
      onMouseLeave={onClick?e=>{e.currentTarget.style.boxShadow="none";e.currentTarget.style.borderColor=T.border}:undefined}>
      {children}
    </div>
  );

  const Tag = ({label, color, bg}) => (
    <span style={{ background:bg||color+"18", color, border:`1px solid ${color}30`, borderRadius:5, padding:"2px 8px", fontSize:11, fontWeight:600, fontFamily:fontSans, letterSpacing:"0.02em", whiteSpace:"nowrap" }}>{label}</span>
  );

  const Btn = ({children,onClick,variant="primary",style={},disabled=false}) => {
    const base = { padding:"8px 18px", borderRadius:8, border:"none", cursor:disabled?"not-allowed":"pointer", fontSize:13, fontWeight:500, fontFamily:fontSans, transition:"all 0.15s", display:"inline-flex", alignItems:"center", gap:6, opacity:disabled?0.5:1 };
    const variants = {
      primary:{ background:T.accent, color:"white", ":hover":"filter:brightness(1.08)" },
      secondary:{ background:T.surface2, color:T.text2, border:`1px solid ${T.border}` },
      ghost:{ background:"transparent", color:T.muted, border:`1px solid ${T.border}` },
      danger:{ background:T.dangerLight, color:T.danger, border:`1px solid ${T.danger}30` },
      success:{ background:T.successLight, color:T.success, border:`1px solid ${T.success}30` },
    };
    return <button disabled={disabled} onClick={onClick} style={{...base,...variants[variant],...style}}
      onMouseEnter={e=>{ if(!disabled) e.currentTarget.style.filter="brightness(0.95)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.filter=""; }}>{children}</button>;
  };

  const Input = ({value,onChange,placeholder,style={},type="text",multiline=false}) => {
    const s = { width:"100%", background:T.surface, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", fontSize:14, color:T.text, fontFamily:fontSans, ...style };
    return multiline
      ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={3} style={{...s,resize:"vertical",lineHeight:1.5}} onFocus={e=>e.currentTarget.style.borderColor=T.accent} onBlur={e=>e.currentTarget.style.borderColor=T.border}/>
      : <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={s} onFocus={e=>e.currentTarget.style.borderColor=T.accent} onBlur={e=>e.currentTarget.style.borderColor=T.border}/>;
  };

  const Divider = () => <div style={{ height:1, background:T.border, margin:"16px 0" }}/>;

  // USAGE BADGE
  const UsageBadge = () => {
    const remaining = user ? getRemainingCalls(user.id) : 0;
    const pct = remaining / DAILY_LIMIT;
    const color = pct > 0.5 ? T.success : pct > 0.2 ? T.warn : T.danger;
    return <span style={{background:color+"14",color,border:"1px solid "+color+"30",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:600,fontFamily:fontSans}}>{remaining}/{DAILY_LIMIT} AI calls left</span>;
  };

  // API KEY MODAL
  const ApiKeyModal = () => showApiKeyModal ? (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}} onClick={()=>setShowApiKeyModal(false)}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.surface,border:"1px solid "+T.border,borderRadius:16,padding:32,maxWidth:480,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,0.15)",animation:"fadeUp 0.3s ease"}}>
        <h2 style={{fontFamily:font,fontSize:22,color:T.text,marginBottom:8}}>Gemini API Key</h2>
        <p style={{color:T.text2,fontSize:13,marginBottom:6,lineHeight:1.6}}>This app uses Google's free Gemini API. Get your key from:</p>
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style={{color:T.accent,fontSize:13,fontWeight:600,display:"block",marginBottom:16}}>aistudio.google.com/apikey →</a>
        <p style={{color:T.muted,fontSize:12,marginBottom:16,background:T.surface2,padding:"10px 12px",borderRadius:8,border:"1px solid "+T.border}}>Your key is stored only in your browser's localStorage. Never sent anywhere except Google's API.</p>
        <Input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="AIzaSy... (paste your Gemini API key)" type="password"/>
        <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
          <Btn variant="secondary" onClick={()=>setShowApiKeyModal(false)}>Cancel</Btn>
          <Btn onClick={()=>{setGeminiKey(apiKeyInput.trim());setShowApiKeyModal(false);showToast("API key saved!");}}>Save key</Btn>
        </div>
        {getGeminiKey() && <div style={{marginTop:12,padding:"8px 12px",background:T.successLight,borderRadius:8,border:"1px solid "+T.success+"25",fontSize:12,color:T.success}}>Key set (ends in ...{getGeminiKey().slice(-4)})</div>}
      </div>
    </div>
  ) : null;

  // NAV
  const NavBar = () => {
    const navItems = user?.role==="vet"
      ? [["dashboard","Dashboard"],["cases","Library"],["feed","My Cases"],["performance","Progress"]]
      : [["admin","Admin"],["cases","Content Library"]];
    return (
      <div style={{ background:T.surface, borderBottom:`1px solid ${T.border}`, padding:"0 28px", display:"flex", alignItems:"center", justifyContent:"space-between", height:52, position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${T.accent},#8b5cf6)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14 }}>🐾</div>
          <span style={{ fontFamily:font, fontSize:17, fontWeight:600, color:T.text }}>VetMentor</span>
          <span style={{ color:T.muted, fontSize:12, fontFamily:fontSans }}>· Supertails</span>
        </div>
        <div style={{ display:"flex", gap:2 }}>
          {navItems.map(([s,l])=>(
            <button key={s} onClick={()=>setScreen(s)} style={{ padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:13,fontFamily:fontSans,fontWeight:500,
              background:screen===s?T.accentLight:"transparent",color:screen===s?T.accent:T.muted, transition:"all 0.15s" }}>
              {l}
            </button>
          ))}
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:8 }}>
          {user && <UsageBadge/>}
          <button onClick={()=>{setApiKeyInput(getGeminiKey());setShowApiKeyModal(true);}} title="API Key Settings" style={{ background:T.surface2,border:"1px solid "+T.border,borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:14 }}>🔑</button>
          <div style={{ width:30,height:30,borderRadius:"50%",background:user?.color||T.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"white" }}>{user?.avatar}</div>
          <div>

          <span style={{ color:T.text2,fontSize:13 }}><strong style={{ color:T.text }}>{questions.filter(q=>quizTopics.length===0||quizTopics.includes(q.topic)).length}</strong> questions in pool · 10 will be selected randomly</span>

        <Btn onClick={startQuiz} style={{ width:"100%",justifyContent:"center",padding:"12px",fontSize:14,borderRadius:10 }}>Begin assessment →</Btn>

  // ── QUIZ SESSION ───────────────────────────────────────────────────────────
  if(screen==="quiz-session") {
    if(quizDone) {
      const score=quizQs.filter(q=>quizAnswers[q.id]===q.correct).length;
      const pct=Math.round(score/quizQs.length*100);
      return (
        <PageWrap>
          <div style={{ maxWidth:600,margin:"0 auto",textAlign:"center",padding:"40px 0",animation:"fadeUp 0.4s ease" }}>
            <div style={{ fontSize:60,marginBottom:12 }}>{pct>=80?"🏆":pct>=60?"✅":"📚"}</div>
            <h1 style={{ fontFamily:font,fontSize:32,color:T.text,marginBottom:8 }}>Assessment complete</h1>
            <div style={{ fontFamily:font,fontSize:52,fontWeight:600,color:T.accent,margin:"16px 0" }}>{score}/{quizQs.length}</div>
            <p style={{ color:T.text2,fontSize:15,marginBottom:28,fontStyle:"italic" }}>{pct>=80?"Excellent clinical reasoning.":pct>=60?"Good performance — review the missed explanations.":"Review the Ettinger chapters for topics you missed."}</p>
            <Card style={{ padding:20,marginBottom:20,textAlign:"left" }}>
              <div style={{ fontFamily:font,fontSize:16,fontWeight:600,color:T.text,marginBottom:12 }}>Question review</div>
              {quizQs.map((q,i)=>(<div key={i} style={{ display:"flex",gap:10,padding:"8px 0",borderBottom:`1px solid ${T.border}`,alignItems:"flex-start" }}>
                <span>{quizAnswers[q.id]===q.correct?"✅":"❌"}</span>
                <div>
                  <div style={{ color:T.text,fontSize:13,lineHeight:1.4 }}>{q.question.slice(0,90)}...</div>
                  <div style={{ color:T.muted,fontSize:11,marginTop:2 }}>📖 {q.reference}</div>
                </div>
              </div>))}
            </Card>
            <div style={{ display:"flex",gap:10,justifyContent:"center" }}>
              <Btn onClick={()=>setScreen("quiz")}>New assessment</Btn>
              <Btn variant="secondary" onClick={()=>setScreen("performance")}>View my progress</Btn>
            </div>
          </div>
        </PageWrap>
      );
    }
    const q=quizQs[quizIdx];
    const answered=quizAnswers[q?.id];
    const isAnswered=answered!==undefined;
    return (
      <PageWrap>
        <div style={{ maxWidth:720,margin:"0 auto" }}>
          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:16 }}>
            <div><h2 style={{ fontFamily:font,fontSize:22,color:T.text }}>Question {quizIdx+1} of {quizQs.length}</h2></div>
            <div style={{ fontSize:13,color:T.muted }}>Score: <strong style={{ color:T.accent }}>{quizQs.filter(q=>quizAnswers[q.id]===q.correct).length}</strong></div>
          </div>
          <div style={{ height:4,background:T.border,borderRadius:4,marginBottom:22 }}>
            <div style={{ height:"100%",background:T.accent,borderRadius:4,width:`${(quizIdx/quizQs.length)*100}%`,transition:"width 0.3s" }}/>
          </div>
          {q&&(<>
            <Card style={{ padding:22,marginBottom:14 }}>
              <div style={{ display:"flex",gap:6,marginBottom:12 }}>
                <Tag label={q.topic} color={topicColor(q.topic)}/><Tag label={q.difficulty} color={diffColor(q.difficulty)}/><Tag label={q.species||"Dog"} color={T.muted}/>
              </div>
              <p style={{ fontFamily:font,fontSize:17,color:T.text,lineHeight:1.65 }}>{q.question}</p>
            </Card>
            <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:16 }}>
              {q.options.map((opt,idx)=>{
                let bg=T.surface,border=T.border,col=T.text,lc=T.muted;
                if(isAnswered){ if(idx===q.correct){bg=T.successLight;border=T.success+"60";col=T.success;lc=T.success;} else if(idx===answered){bg=T.dangerLight;border=T.danger+"60";col=T.danger;lc=T.danger;} }
                return <button key={idx} onClick={()=>!isAnswered&&handleQuizAnswer(idx)}
                  style={{ background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"13px 16px",color:col,textAlign:"left",cursor:isAnswered?"default":"pointer",fontSize:14,fontFamily:fontSans,lineHeight:1.5,transition:"all 0.2s" }}
                  onMouseEnter={e=>{ if(!isAnswered) e.currentTarget.style.borderColor=T.border2; }}
                  onMouseLeave={e=>{ if(!isAnswered) e.currentTarget.style.borderColor=T.border; }}>
                  <span style={{ fontWeight:700,marginRight:8,color:lc }}>{String.fromCharCode(65+idx)}.</span>{opt}
                </button>;
              })}
            </div>
            {isAnswered&&(<Card style={{ padding:22,background:answered===q.correct?T.successLight:T.surface,border:`1px solid ${answered===q.correct?T.success+"40":T.border}` }}>
              <div style={{ fontWeight:600,fontSize:15,color:answered===q.correct?T.success:T.danger,marginBottom:10 }}>
                {answered===q.correct?"✅ Correct!":"❌ Incorrect — here's the clinical reasoning:"}
              </div>
              <p style={{ color:T.text2,fontSize:14,lineHeight:1.7,marginBottom:10 }}>{q.explanation}</p>
              {answered!==q.correct&&q.wrong?.[answered]&&(
                <div style={{ background:T.dangerLight,border:`1px solid ${T.danger}25`,borderRadius:8,padding:12,marginBottom:10,fontSize:13,color:T.danger }}>
                  <strong>Why option {String.fromCharCode(65+answered)} is wrong:</strong> {q.wrong[answered]}
                </div>
              )}
              <div style={{ background:T.surface2,borderRadius:7,padding:"8px 12px",fontSize:12,color:T.muted,marginBottom:14 }}>📖 {q.reference}</div>
              <Btn onClick={nextQ}>{quizIdx+1>=quizQs.length?"View results →":"Next question →"}</Btn>
            </Card>)}
          </>)}
        </div>
      </PageWrap>
    );
  }

  // ── PERFORMANCE ────────────────────────────────────────────────────────────
  if(screen==="performance") {
    const quizzes=userData.quizzesDone||[];
    const topicScores=userData.topicScores||{};
    const avg=quizzes.length?Math.round(quizzes.reduce((a,q)=>a+q.score/q.total*100,0)/quizzes.length):0;
    return (
      <PageWrap>
        <h1 style={{ fontFamily:font,fontSize:28,fontWeight:600,color:T.text,marginBottom:4 }}>My Progress</h1>

        <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24 }}>
          {[{l:"Cases Done",v:userData.casesCompleted?.length||0,c:T.accent},{l:"Quizzes Taken",v:quizzes.length,c:"#8b5cf6"},{l:"Avg Quiz Score",v:avg?`${avg}%`:"—",c:T.warn},{l:"Topics Covered",v:Object.keys(topicScores).length,c:T.success}].map(s=>(
            <Card key={s.l} style={{ padding:"18px 20px" }}>
              <div style={{ fontFamily:font,fontSize:30,fontWeight:600,color:s.c,marginBottom:2 }}>{s.v}</div>

          <Card style={{ padding:22 }}>

                    <span style={{ fontSize:13,color:T.text }}>{TOPIC_ICONS[t]} {t}</span>
                    <span style={{ fontSize:13,fontWeight:600,color:pct>=70?T.success:pct>=50?T.warn:T.danger }}>{pct}% ({s.correct}/{s.total})</span>
                  </div>
                  <div style={{ height:6,background:T.border,borderRadius:3 }}>
                    <div style={{ height:"100%",borderRadius:3,background:pct>=70?T.success:pct>=50?T.warn:T.danger,width:`${pct}%`,transition:"width 0.5s" }}/>
                  </div>
                </div>;
              })
            }
          </Card>
          <Card style={{ padding:22 }}>
            <h3 style={{ fontFamily:font,fontSize:17,color:T.text,marginBottom:16 }}>Quiz History</h3>
            {!quizzes.length
              ? <div style={{ color:T.muted,textAlign:"center",fontStyle:"italic",padding:"20px 0" }}>No quizzes yet</div>
              : [...quizzes].reverse().slice(0,8).map((q,i)=>{
                const pct=Math.round(q.score/q.total*100);
                return <div key={i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${T.border}` }}>
                  <div>
                    <div style={{ fontSize:13,fontWeight:500,color:T.text }}>{q.score}/{q.total} questions correct</div>
                    <div style={{ fontSize:11,color:T.muted }}>{new Date(q.date).toLocaleDateString("en-IN")}</div>
                  </div>
                  <span style={{ fontWeight:700,color:pct>=80?T.success:pct>=60?T.warn:T.danger }}>{pct}%</span>
                </div>;
              })
            }
            {quizzes.length>0&&<Btn onClick={()=>setScreen("quiz")} style={{ marginTop:14,width:"100%",justifyContent:"center" }}>Take new assessment</Btn>}
          </Card>
        </div>
      </PageWrap>
    );
  }

  // ── MY CASES FEED ──────────────────────────────────────────────────────────
  if(screen==="feed") {
    const [commentInputs, setCommentInputs] = useState({});
    return (
      <PageWrap>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24 }}>
          <div>
            <h1 style={{ fontFamily:font,fontSize:28,fontWeight:600,color:T.text,marginBottom:4 }}>My Cases</h1>
            <p style={{ color:T.muted,fontSize:13 }}>Share and learn from real clinical cases across all Supertails clinics</p>
          </div>
          <Btn onClick={()=>setPostingCase(true)}>+ Share a case</Btn>
        </div>

        {/* Post form */}
        {postingCase&&(
          <Card style={{ padding:24,marginBottom:20,border:`1.5px solid ${T.accent}` }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
              <h3 style={{ fontFamily:font,fontSize:18,color:T.text }}>Share Your Clinical Case</h3>

            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12 }}>
              <div><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Case Title *</label><Input value={newPostForm.title} onChange={e=>setNewPostForm(p=>({...p,title:e.target.value}))} placeholder="e.g. Tick paralysis — a lesson in clinical observation"/></div>
              <div><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Species & Breed</label><Input value={newPostForm.breed} onChange={e=>setNewPostForm(p=>({...p,breed:e.target.value}))} placeholder="e.g. Lab, 3 years, MN"/></div>
            </div>
            <div style={{ marginBottom:12 }}><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Chief Complaint *</label><Input value={newPostForm.chiefComplaint} onChange={e=>setNewPostForm(p=>({...p,chiefComplaint:e.target.value}))} placeholder="Why did the patient present?"/></div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12 }}>
              <div><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Clinical Findings</label><Input multiline value={newPostForm.clinicalFindings} onChange={e=>setNewPostForm(p=>({...p,clinicalFindings:e.target.value}))} placeholder="Vitals, physical exam findings..."/></div>
              <div><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Diagnostics Summary</label><Input multiline value={newPostForm.diagnosticsSummary} onChange={e=>setNewPostForm(p=>({...p,diagnosticsSummary:e.target.value}))} placeholder="Key lab/imaging findings..."/></div>
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12 }}>
              <div><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Management</label><Input multiline value={newPostForm.management} onChange={e=>setNewPostForm(p=>({...p,management:e.target.value}))} placeholder="Treatment approach..."/></div>
              <div><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Outcome</label><Input multiline value={newPostForm.outcome} onChange={e=>setNewPostForm(p=>({...p,outcome:e.target.value}))} placeholder="Patient outcome..."/></div>
            </div>
            <div style={{ marginBottom:12 }}><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Key Learning Point 💡</label><Input multiline value={newPostForm.learningPoint} onChange={e=>setNewPostForm(p=>({...p,learningPoint:e.target.value}))} placeholder="What would you want your colleagues to remember from this case?"/></div>
            <div style={{ marginBottom:16 }}><label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Tags (comma-separated)</label><Input value={newPostForm.tags} onChange={e=>setNewPostForm(p=>({...p,tags:e.target.value}))} placeholder="e.g. Neurology, Emergency, Clinical Pearl"/></div>
            <div style={{ display:"flex",gap:8,justifyContent:"flex-end" }}>
              <Btn variant="secondary" onClick={()=>setPostingCase(false)}>Cancel</Btn>
              <Btn onClick={submitPost} disabled={!newPostForm.title||!newPostForm.chiefComplaint}>Publish case →</Btn>
            </div>
          </Card>

        {/* Feed */}
        <div style={{ display:"flex",flexDirection:"column",gap:20,maxWidth:760,margin:"0 auto" }}>
          {feedPosts.map(post=>(
              <FeedPostCard key={post.id} post={post} T={T} font={font} fontSans={fontSans} topicColor={topicColor} addReaction={addReaction} addComment={addComment} user={user}/>

          {feedPosts.length===0&&<div style={{ textAlign:"center",padding:"60px 0",color:T.muted,fontStyle:"italic" }}>No cases shared yet. Be the first to post!</div>}
        </div>
      </PageWrap>
    );
  }
  

  // ── ADMIN DASHBOARD ────────────────────────────────────────────────────────
  if(screen==="admin") {
    const allVets=USERS_DB.filter(x=>x.role==="vet");
    const totalCases=Object.values(adminData).reduce((a,d)=>a+(d.progress?.casesCompleted?.length||0),0);
    const totalQuizzes=Object.values(adminData).reduce((a,d)=>a+(d.progress?.quizzesDone?.length||0),0);
    const avgAll=(()=>{ const all=Object.values(adminData).flatMap(d=>d.progress?.quizzesDone||[]); return all.length?Math.round(all.reduce((a,q)=>a+q.score/q.total*100,0)/all.length):0; })();
    const topicAct={}; Object.values(adminData).forEach(d=>(d.progress?.sessions||[]).forEach(s=>{ if(s.topic) topicAct[s.topic]=(topicAct[s.topic]||0)+1; }));
    const ADMIN_TABS=[["overview","Overview"],["users","Users & Activity"],["content","Content Library"],["generate","AI Generator"]];
    return (
      <PageWrap>
        <div style={{ marginBottom:24 }}>
          <h1 style={{ fontFamily:font,fontSize:28,fontWeight:600,color:T.text,marginBottom:4 }}>Admin Dashboard</h1>
          <p style={{ color:T.muted,fontSize:13 }}>Manage training content, monitor vet progress, and generate new content with AI</p>
        </div>
        {/* Tab nav */}
        <div style={{ display:"flex",gap:2,marginBottom:24,borderBottom:`1px solid ${T.border}`,paddingBottom:0 }}>
          {ADMIN_TABS.map(([k,l])=>(
            <button key={k} onClick={()=>setAdminTab(k)} style={{ padding:"8px 18px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,fontFamily:fontSans,color:adminTab===k?T.accent:T.muted,borderBottom:adminTab===k?`2px solid ${T.accent}`:"2px solid transparent",marginBottom:-1,transition:"color 0.15s" }}>
              {l}
            </button>
          ))}
        </div>

        {/* OVERVIEW */}
        {adminTab==="overview"&&(
          <div style={{ animation:"fadeUp 0.3s ease" }}>
            <div style={{ display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:24 }}>
              {[{l:"Total Vets",v:allVets.length,c:T.accent},{l:"Cases Completed",v:totalCases,c:T.success},{l:"Quizzes Taken",v:totalQuizzes,c:"#8b5cf6"},{l:"Avg Quiz Score",v:avgAll?`${avgAll}%`:"—",c:T.warn},{l:"Content Items",v:cases.length+questions.length,c:"#ec4899"}].map(s=>(
                <Card key={s.l} style={{ padding:"16px 18px" }}>
                  <div style={{ fontFamily:font,fontSize:28,fontWeight:600,color:s.c,marginBottom:2 }}>{s.v}</div>
                  <div style={{ color:T.muted,fontSize:12 }}>{s.l}</div>
                </Card>
              ))}

            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:18 }}>
              <Card style={{ padding:22 }}>
                <h3 style={{ fontFamily:font,fontSize:17,color:T.text,marginBottom:14 }}>Vet Training Status</h3>

                  const d=adminData[v.id]?.progress;
                  const cs2=d?.casesCompleted?.length||0; const qz=d?.quizzesDone?.length||0;

                  const last=d?.sessions?.[d.sessions.length-1];
                  return <div key={v.id} style={{ padding:"11px 0",borderBottom:`1px solid ${T.border}` }}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                      <div style={{ display:"flex",gap:10,alignItems:"center" }}>
                        <div style={{ width:32,height:32,borderRadius:"50%",background:v.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"white" }}>{v.avatar}</div>
                        <div><div style={{ fontSize:14,fontWeight:500,color:T.text }}>{v.name}</div><div style={{ fontSize:11,color:T.muted }}>{v.clinic}</div></div>

                        <Tag label={`${cs2} cases`} color={T.accent}/><Tag label={`${qz} quizzes`} color="#8b5cf6"/>

                      <div style={{ height:5,background:T.border,borderRadius:3 }}>
                        <div style={{ height:"100%",borderRadius:3,background:topicColor(t),width:`${Math.min(100,(count/Math.max(...Object.values(topicAct)))*100)}%` }}/>
                      </div>
                    </div>
                  ))
                }
              </Card>
            </div>
          </div>
        )}

        {/* USERS & ACTIVITY */}
        {adminTab==="users"&&(
          <div style={{ animation:"fadeUp 0.3s ease" }}>
            <Card style={{ padding:22 }}>
              <h3 style={{ fontFamily:font,fontSize:17,color:T.text,marginBottom:16 }}>Recent Activity Log</h3>
              {(()=>{
                const allS=allVets.flatMap(v=>(adminData[v.id]?.progress?.sessions||[]).map(s=>({...s,vet:v.name,clinic:v.clinic,vetColor:v.color,avatar:v.avatar})));
                const sorted=allS.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,20);
                if(!sorted.length) return <div style={{ color:T.muted,textAlign:"center",fontStyle:"italic",padding:"30px 0" }}>No activity recorded yet</div>;
                return sorted.map((s,i)=>(
                  <div key={i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${T.border}` }}>
                    <div style={{ display:"flex",gap:10,alignItems:"center" }}>
                      <div style={{ width:30,height:30,borderRadius:"50%",background:s.vetColor||T.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0 }}>{s.avatar}</div>
                      <div>
                        <div style={{ fontSize:13,fontWeight:500,color:T.text }}>{s.vet}</div>
                        <div style={{ fontSize:11,color:T.muted }}>{s.clinic} · {s.type==="case"?`📋 Case: ${cases.find(x=>x.id===s.id)?.title?.slice(0,40)||s.id}...`:`📝 Quiz: ${s.score}/${s.total}`}</div>
                      </div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      {s.type==="quiz"&&<div style={{ fontSize:13,fontWeight:700,color:s.score/s.total>=0.7?T.success:T.warn }}>{Math.round(s.score/s.total*100)}%</div>}
                      <div style={{ color:T.muted,fontSize:11 }}>{new Date(s.date).toLocaleDateString("en-IN")}</div>
                    </div>
                  </div>
                ));
              })()}
            </Card>
          </div>
        )}

        {/* CONTENT LIBRARY */}
        {adminTab==="content"&&(
          <div style={{ animation:"fadeUp 0.3s ease" }}>
            <div style={{ display:"flex",justifyContent:"space-between",marginBottom:16 }}>
              <div>
                <div style={{ fontFamily:font,fontSize:18,color:T.text,fontWeight:600 }}>Content Library Management</div>
                <div style={{ color:T.muted,fontSize:13 }}>{cases.length} cases · {questions.length} questions</div>
              </div>
              <div style={{ display:"flex",gap:6 }}>
                {["cases","assessment"].map(v=>(
                  <button key={v} onClick={()=>setCaseView(v)} style={{ padding:"6px 14px",borderRadius:8,border:`1px solid ${caseView===v?T.accent:T.border}`,background:caseView===v?T.accentLight:"transparent",color:caseView===v?T.accent:T.muted,cursor:"pointer",fontSize:13,fontFamily:fontSans }}>
                    {v==="cases"?"Cases":"Questions"}
                  </button>
                ))}
              </div>
            </div>
            {caseView==="cases"?(
              <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                {cases.map(c=>(
                  <Card key={c.id} style={{ padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                    <div>
                      <div style={{ display:"flex",gap:6,marginBottom:5 }}>
                        <Tag label={c.topic} color={topicColor(c.topic)}/><Tag label={c.difficulty} color={diffColor(c.difficulty)}/><Tag label={c.species} color={T.muted}/>
                        {c.id.startsWith("gen_")&&<Tag label="AI Generated" color="#8b5cf6"/>}
                      </div>
                      <div style={{ fontFamily:font,fontSize:15,fontWeight:600,color:T.text }}>{c.title}</div>
                      <div style={{ color:T.muted,fontSize:12 }}>{c.signalment} · {c.reference}</div>
                    </div>
                    <Btn variant="danger" onClick={()=>deleteCase(c.id)} style={{ flexShrink:0 }}>Delete</Btn>
                  </Card>
                ))}
              </div>
            ):(
              <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                {questions.map((q,i)=>(
                  <Card key={q.id} style={{ padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex",gap:6,marginBottom:5 }}>
                        <Tag label={q.topic} color={topicColor(q.topic)}/><Tag label={q.difficulty} color={diffColor(q.difficulty)}/>
                        {q.id.startsWith("gen_")&&<Tag label="AI Generated" color="#8b5cf6"/>}
                      </div>
                      <div style={{ fontSize:13,color:T.text,lineHeight:1.5 }}>{q.question.slice(0,120)}...</div>
                    </div>
                    <Btn variant="danger" onClick={()=>deleteQuestion(q.id)} style={{ marginLeft:12,flexShrink:0 }}>Delete</Btn>
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}

        {/* AI GENERATOR */}
        {adminTab==="generate"&&(
          <div style={{ animation:"fadeUp 0.3s ease", maxWidth:760 }}>
            <Card style={{ padding:26,marginBottom:20 }}>
              <h3 style={{ fontFamily:font,fontSize:19,color:T.text,marginBottom:4 }}>AI Content Generator</h3>
              <p style={{ color:T.muted,fontSize:13,marginBottom:20 }}>Suggest a clinical topic and AI will automatically generate a new case or assessment questions, grounded in Ettinger's Textbook and clinical best practices.</p>
              <div style={{ display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12,marginBottom:12 }}>
                <div>
                  <label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Clinical Topic *</label>
                  <Input value={genTopic} onChange={e=>setGenTopic(e.target.value)} placeholder="e.g. Feline diabetes mellitus, Canine parvovirus, Osteoarthritis management..."/>
                </div>
                <div>
                  <label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Species</label>
                  <select value={genSpecies} onChange={e=>setGenSpecies(e.target.value)} style={{ width:"100%",background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",fontSize:14,color:T.text }}>
                    <option>Dog</option><option>Cat</option><option>Both</option>
                  </select>
                </div>
                <div>
                  <label style={{ fontSize:12,fontWeight:600,color:T.text2,display:"block",marginBottom:4 }}>Difficulty</label>
                  <select value={genDiff} onChange={e=>setGenDiff(e.target.value)} style={{ width:"100%",background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",fontSize:14,color:T.text }}>
                    <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
                  </select>
                </div>
              </div>
              <div style={{ display:"flex",gap:8,marginBottom:20,alignItems:"center" }}>
                <span style={{ fontSize:13,color:T.text2,fontWeight:500 }}>Generate:</span>
                {[["case","Clinical Case"],["questions","3 MCQ Questions"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setGenType(v)} style={{ padding:"6px 14px",borderRadius:8,border:`1px solid ${genType===v?T.accent:T.border}`,background:genType===v?T.accentLight:"transparent",color:genType===v?T.accent:T.muted,cursor:"pointer",fontSize:13,fontFamily:fontSans }}>
                    {l}
                  </button>
                ))}
              </div>
              {genError&&<div style={{ color:T.danger,fontSize:13,marginBottom:10,padding:"8px 12px",background:T.dangerLight,borderRadius:7 }}>⚠ {genError}</div>}
              <Btn onClick={generateContent} disabled={genLoading||!genTopic.trim()} style={{ minWidth:160,justifyContent:"center" }}>
                {genLoading?(
                  <span style={{ display:"flex",alignItems:"center",gap:8 }}>
                    <span style={{ width:14,height:14,border:`2px solid white`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite",display:"inline-block" }}/>
                    Generating...
                  </span>
                ):"✨ Generate with AI"}
              </Btn>
            </Card>

            {/* Preview */}
            {genPreview&&(
              <Card style={{ padding:24,border:`1.5px solid ${T.accent}` }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
                  <div>
                    <div style={{ fontFamily:font,fontSize:17,color:T.text,fontWeight:600 }}>Generated Preview</div>
                    <div style={{ color:T.muted,fontSize:12 }}>Review before publishing to the content library</div>
                  </div>
                  <Tag label="AI Generated" color="#8b5cf6"/>
                </div>
                {genType==="case"&&!Array.isArray(genPreview)?(
                  <div>
                    <div style={{ display:"flex",gap:6,marginBottom:12 }}>
                      <Tag label={genPreview.topic} color={topicColor(genPreview.topic)}/><Tag label={genPreview.difficulty} color={diffColor(genPreview.difficulty)}/><Tag label={genPreview.species} color={T.muted}/>
                    </div>
                    <div style={{ fontFamily:font,fontSize:18,fontWeight:600,color:T.text,marginBottom:8 }}>{genPreview.title}</div>
                    <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
                      {[["Signalment",genPreview.signalment],["Presenting Complaint",genPreview.presenting_complaint],["History",genPreview.history],["Physical Exam",genPreview.physical_exam]].map(([l,v])=>(
                        <div key={l} style={{ background:T.surface2,borderRadius:8,padding:12 }}>
                          <div style={{ fontSize:11,fontWeight:600,color:T.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4 }}>{l}</div>
                          <div style={{ fontSize:13,color:T.text2,lineHeight:1.5 }}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ marginTop:10,padding:"10px 12px",background:"#fef9c3",borderRadius:8,fontSize:13,color:"#854d0e" }}>
                      <strong>Diagnosis:</strong> {genPreview.diagnosis} · <strong>Reference:</strong> {genPreview.reference}
                    </div>
                  </div>
                ):(
                  <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                    {(Array.isArray(genPreview)?genPreview:[genPreview]).map((q,i)=>(
                      <div key={i} style={{ background:T.surface2,borderRadius:9,padding:"14px 16px" }}>
                        <div style={{ fontSize:14,fontWeight:500,color:T.text,marginBottom:8 }}>{i+1}. {q.question}</div>
                        <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
                          {q.options?.map((o,j)=><div key={j} style={{ fontSize:13,color:j===q.correct?T.success:T.text2,fontWeight:j===q.correct?600:400 }}>{String.fromCharCode(65+j)}. {o}{j===q.correct?" ✓":""}</div>)}
                        </div>
                        <div style={{ marginTop:8,fontSize:12,color:T.muted }}>📖 {q.reference}</div>
                      </div>
                    ))}
                  </div>
                )}
                <Divider/>
                <div style={{ display:"flex",gap:8 }}>
                  <Btn onClick={publishGenerated}>Publish to library →</Btn>
                  <Btn variant="secondary" onClick={()=>setGenPreview(null)}>Discard</Btn>
                  <Btn variant="ghost" onClick={generateContent}>Regenerate</Btn>
                </div>
              </Card>
            )}
          </div>
        )}
      </PageWrap>
    );
  }

  return null;
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(VetMentor));

</script>
</body>
</html>
